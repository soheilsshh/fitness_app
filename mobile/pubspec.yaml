name: mobile
description: "Fitness app mobile client (Flutter + Riverpod)."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^4.0.0

  # Routing
  go_router: ^14.6.2

  # Networking
  dio: ^5.7.0

  # Secure storage for tokens
  flutter_secure_storage: ^9.2.4

  # Models / serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Persian (Jalali) dates + i18n helpers
  shamsi_date: ^1.1.0
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  riverpod_generator: ^4.0.0
  freezed: ^3.0.0
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: IRANSansX
      fonts:
        - asset: assets/fonts/IRANSansX-Regular.ttf
